# Project information
site_name: APTITUDE Technical Specification
site_description: APTITUDE Technical Specification
site_author: APTITUDE Consortium
site_url: https://aptitude-consortium.github.io/aptitude-eudi-wallet-rfcs/

# Repository
repo_name: APTITUDE-Consortium/aptitude-eudi-wallet-rfcs
repo_url: https://github.com/APTITUDE-Consortium/aptitude-eudi-wallet-rfcs

# Copyright
copyright: Copyright &copy; 2025 APTITUDE Consortium

# Configuration for MkDocs Material theme
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: img/logo.png

extra_css:
  - media/extra.css

plugins:
  - tags
  - search
  - git-revision-date
  - git-revision-date-localized:  
      locale: en
      fallback_to_build_date: true
      type: datetime  


markdown_extensions:
  - footnotes
  - sane_lists
  - tables
  - toc:
      permalink: true

  
nav:
  - Home: index.md
  - Rulebook:
    - Placeholder 1: rulebook/attestation-rulebook-1.md
    - Placeholder 2: rulebook/attestation-rulebook-2.md
  - Standards: standards.md
  - Glossary: glossary.md


