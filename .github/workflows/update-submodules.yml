name: Update Submodules

on:
  repository_dispatch:
    types: 
        - pr-closed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.APTITUDE_REPO_UPDATE_PAT }}

      - name: Update wp2-trust-specifications submodule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --remote --branch main docs/rulebook/wp2-trust-specifications 
          
      - name: Check for changes
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create pull request for submodule update
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.APTITUDE_REPO_UPDATE_PAT }}
          commit-message: "chore: update wp2-trust-specifications submodule"
          branch: "chore/update-wp2-trust-submodule"
          base: "main"
          title: "chore: update wp2-trust-specifications submodule"
          body: |
            Automated update of `docs/rulebook/wp2-trust-specifications` submodule pointer.
